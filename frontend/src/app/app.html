<mat-toolbar class="barra-app">
  <mat-icon aria-hidden="true">account_tree</mat-icon>
  <span>Task Scheduler</span>
  <span class="spaziatore"></span>
  @if (statoEngine()?.stato) {
    <span class="etichetta-stato-engine">Stato Engine:</span>
    <span class="stato-toolbar" [class]="'stato-toolbar stato-' + statoEngine()!.stato">
      {{ etichettaStato(statoEngine()!.stato) }}
    </span>
  }
  <button mat-icon-button type="button" matTooltip="Configurazione" (click)="apriConfigurazione()">
    <mat-icon aria-hidden="true">settings</mat-icon>
  </button>
</mat-toolbar>

<main class="dashboard">
  <mat-tab-group class="tab-principali" (selectedTabChange)="onCambioTab($event)">
    <mat-tab label="Catalogo workflow">
      <app-sezione-catalogo></app-sezione-catalogo>
    </mat-tab>

    <mat-tab label="In esecuzione">
      <app-sezione-esecuzione></app-sezione-esecuzione>
    </mat-tab>

    <mat-tab label="Esecuzioni passate">
      <app-sezione-storico></app-sezione-storico>
    </mat-tab>
  </mat-tab-group>
</main>
