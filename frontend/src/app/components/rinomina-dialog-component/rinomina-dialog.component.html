<h2 mat-dialog-title>Rinomina workflow</h2>

<mat-dialog-content>
  <mat-form-field appearance="outline" class="campo-nome">
    <mat-label>Nome workflow</mat-label>
    <input matInput type="text" [formControl]="nome" (keyup.enter)="salva()" />
    @if (nome.hasError('required') || nome.hasError('vuoto')) {
      <mat-error>Il nome non può essere vuoto</mat-error>
    }
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="annulla()">Annulla</button>
  <button mat-flat-button type="button" color="primary" [disabled]="nome.invalid" (click)="salva()">
    Salva
  </button>
</mat-dialog-actions>
