quarkus.http.port=8085

task.scheduler.worker.numero=1
dao.strategy=hibernate

# TODO: solo per debug
task.scheduler.debug.probabilita-fallimento=0.3

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=task_scheduler
quarkus.datasource.password=task_scheduler
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/task_scheduler

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
quarkus.hibernate-orm.schema-management.strategy=validate

# Abilitare per strategia mock
#.dao.strategy=mock
#.quarkus.datasource.active=false
#.quarkus.hibernate-orm.active=false
#.quarkus.flyway.migrate-at-start=false

%test.dao.strategy=mock
%test.quarkus.datasource.active=false
%test.quarkus.hibernate-orm.active=false
%test.quarkus.flyway.migrate-at-start=false
%test.task.scheduler.debug.probabilita-fallimento=0
%test.task.scheduler.worker.numero=2

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type
