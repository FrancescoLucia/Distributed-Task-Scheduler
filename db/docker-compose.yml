services:
  postgres:
    image: postgres:16-alpine
    container_name: task-scheduler-postgres
    environment:
      POSTGRES_DB: task_scheduler
      POSTGRES_USER: task_scheduler
      POSTGRES_PASSWORD: task_scheduler
    ports:
      - "5432:5432"
    volumes:
      - task-scheduler-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_scheduler -d task_scheduler"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  task-scheduler-postgres-data:
